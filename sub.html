<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Task Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        header {
            padding: 2rem;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        h1 { color: #333; font-size: 1.5rem; margin-bottom: 0.5rem; }
        
        .subtitle { color: #666; font-size: 0.9rem; }

        .input-group { padding: 1.5rem; display: flex; gap: 0.5rem; }
        
        input[type="text"] {
            flex: 1;
            padding: 0.75rem;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus { outline: none; border-color: #667eea; }

        button#addBtn {
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button#addBtn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4); }

        .task-list { padding: 0; margin: 0; list-style: none; }
        
        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #f0f0f0;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .task-item.completed span { text-decoration: line-through; color: #999; }
        
        .checkbox { margin-right: 1rem; cursor: pointer; }
        
        .delete-btn {
            background: none;
            border: none;
            color: #ff4757;
            cursor: pointer;
            padding: 0.25rem;
            opacity: 0.6;
            transition: all 0.2s;
        }

        .delete-btn:hover { opacity: 1; transform: scale(1.1); }

        .stats {
            padding: 1rem 1.5rem;
            background: #f8f9fa;
            display: flex;
            justify-content: space-between;
            color: #666;
            font-size: 0.85rem;
        }

        .empty-state {
            padding: 3rem;
            text-align: center;
            color: #999;
        }

        @media (max-width: 480px) {
            body { padding: 1rem; }
            h1 { font-size: 1.25rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 Task Tracker</h1>
            <p class="subtitle">Stay organized, one task at a time</p>
        </header>

        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Add a new task..." maxlength="50">
            <button id="addBtn">Add</button>
        </div>

        <ul class="task-list" id="taskList"></ul>

        <div class="stats">
            <span><strong id="totalTasks">0</strong> tasks total</span>
            <span><strong id="completedTasks">0</strong> completed</span>
        </div>
    </div>

    <script>
        // Task Tracker Logic
        const taskInput = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const taskList = document.getElementById('taskList');
        const totalTasksEl = document.getElementById('totalTasks');
        const completedTasksEl = document.getElementById('completedTasks');

        let tasks = [];

        function render() {
            taskList.innerHTML = '';
            
            if (tasks.length === 0) {
                taskList.innerHTML = '<div class="empty-state">No tasks yet. Add one above! ✨</div>';
            } else {
                tasks.forEach((task, index) => {
                    const li = document.createElement('li');
                    li.className = `task-item ${task.completed ? 'completed' : ''}`;
                    
                    li.innerHTML = `
                        <label class="checkbox">
                            <input type="checkbox" 
                                   ${task.completed ? 'checked' : ''}
                                   onchange="toggleTask(${index})">
                            ${escapeHtml(task.text)}
                        </label>
                        <button class="delete-btn" onclick="deleteTask(${index})">×</button>
                    `;
                    
                    taskList.appendChild(li);
                });
            }

            updateStats();
        }

        function addTask() {
            const text = taskInput.value.trim();
            if (!text) return;

            tasks.push({ text, completed: false });
            taskInput.value = '';
            render();
        }

        function toggleTask(index) {
            tasks[index].completed = !tasks[index].completed;
            render();
        }

        function deleteTask(index) {
            tasks.splice(index, 1);
            render();
        }

        function updateStats() {
            totalTasksEl.textContent = tasks.length;
            completedTasksEl.textContent = tasks.filter(t => t.completed).length;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Event Listeners
        addBtn.addEventListener('click', addTask);
        
        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });

        // Initial render
        render();
    </script>
</body>
</html>
