<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: white;
            position: relative; /* Necessary for absolute positioning of children */
            font-family: sans-serif;
        }

        /* Main centered text */
        .centered-text {
            color: black;
            font-size: 2rem;
            font-weight: bold;
        }

    
        .bottom-right-text {
            position: absolute;
            bottom: 20px;
            right: 20px; 
            color: black;
            font-size: 0.8rem;
            font-weight: normal;
        }
    </style>
</head>
<body>

    <div class="centered-text">
        Sub-Domain
    </div>

    <div class="bottom-right-text">
        Portfolio website by Teng
    </div>

</body>
</html>
