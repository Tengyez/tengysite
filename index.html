<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>homelab</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: white;
            position: relative;
            font-family: sans-serif;
        }

        .header-container {
            text-align: center;
        }

        .centered-text {
            color: black;
            font-size: 2rem;
            font-weight: bold;
            margin: 0;
        }

        .sub-text {
            font-size: 0.75rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: block;
            margin-top: 5px;
        }

        /* Container for the stacked items in the bottom right */
        .bottom-right-wrapper {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* This aligns the first letters to the left */
        }

        .stacked-links {
            display: flex;
            flex-direction: column;
            margin-bottom: 6px;
        }

        .stacked-links a {
            text-decoration: none;
            color: black;
            font-size: 0.65rem; /* Smaller than the credit text */
            margin-bottom: 2px;
            font-weight: normal;
        }

        .stacked-links a:hover {
            text-decoration: underline;
        }

        .bottom-right-text {
            color: black;
            font-size: 0.8rem;
            font-weight: normal;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="centered-text">
            Apex-domain
        </div>
        <span class="sub-text">under construction</span>
    </div>

    <div class="bottom-right-wrapper">
        <div class="stacked-links">
            <a href="#">/cd apex⠀</a>
            <a href="#">/cd sub-1</a>
            <a href="#">/cd sub-2</a>
        </div>
        <div class="bottom-right-text">
            Portfolio website by Teng
        </div>
    </div>

</body>
</html>
