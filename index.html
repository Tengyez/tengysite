<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: white;
            position: relative;
            font-family: sans-serif;
        }

        .header-container {
            text-align: center;
        }

        .centered-text {
            color: black;
            font-size: 2rem;
            font-weight: bold;
            margin: 0;
        }

        .sub-text {
            font-size: 0.75rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: block;
            margin-top: 5px;
        }

        /* Container for bottom-right elements */
        .bottom-right-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            text-align: right;
        }

        /* Stacked links styling */
        .stacked-links {
            display: flex;
            flex-direction: column;
            margin-bottom: 8px; /* Gap between links and credit text */
        }

        .stacked-links a {
            text-decoration: none;
            color: black;
            font-size: 0.7rem; /* Slightly smaller than the credit text */
            margin-bottom: 2px;
            font-weight: normal;
        }

        .stacked-links a:hover {
            text-decoration: underline;
        }

        .bottom-right-text {
            color: black;
            font-size: 0.8rem;
            font-weight: normal;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="centered-text">
            Apex-domain
        </div>
        <span class="sub-text">under construction</span>
    </div>

    <div class="bottom-right-container">
        <div class="stacked-links">
            <a href="www.tengy.site">/cd apex </a>
            <a href="www.sub.tengy.site">/cd sub-1</a>
            <a href="www.fun.tengy.site">/cd sub-2</a>
        </div>
        <div class="bottom-right-text">
            Portfolio website by Teng
        </div>
    </div>

</body>
</html>
