<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>homelab</title>
    <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
<link rel="shortcut icon" href="/favicon/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
<link rel="manifest" href="/favicon/site.webmanifest" />
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: white;
            position: relative;
            font-family: sans-serif;
        }

        /* Container for the main center content */
        .header-container {
            text-align: center;
        }

        .centered-text {
            color: black;
            font-size: 2rem;
            font-weight: bold;
            margin: 0;
        }

        /* Small text under Apex-domain */
        .sub-text {
            font-size: 0.75rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: block;
            margin-top: 5px;
        }

        .bottom-right-text {
            position: absolute;
            bottom: 20px;
            right: 20px; 
            color: black;
            font-size: 0.8rem;
            font-weight: normal;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="centered-text">
            Sub-domain1
        </div>
        <span class="sub-text">under construction</span>
    </div>

    <div class="bottom-right-text">
        Portfolio website by Teng
    </div>

</body>
