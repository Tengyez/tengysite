<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            background: #fff;
        }

        /* Top Nav Simulation */
        .top-nav {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            padding: 15px 20px;
            gap: 15px;
            font-size: 13px;
            color: rgba(0,0,0,0.87);
        }

        .top-nav a { text-decoration: none; color: inherit; }
        .top-nav a:hover { text-decoration: underline; }

        /* Main Content */
        .main {
            margin-top: 12%;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .logo {
            font-size: 90px;
            font-weight: 500;
            margin-bottom: 30px;
            letter-spacing: -3px;
            user-select: none;
        }

        /* Official Google Colors */
        .g-b { color: #4285f4; }
        .g-r { color: #ea4335; }
        .g-y { color: #fbbc05; }
        .g-g { color: #34a853; }

        /* Search Bar */
        .search-box {
            width: 584px;
            height: 44px;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            transition: box-shadow 0.1s;
        }

        .search-box:hover, .search-box:focus-within {
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
            border-color: rgba(223,225,229,0);
        }

        input {
            flex: 1;
            height: 34px;
            border: none;
            outline: none;
            font-size: 16px;
            padding: 0 10px;
        }

        .buttons {
            margin-top: 30px;
            display: flex;
            gap: 12px;
        }

        .btn {
            background-color: #f8f9fa;
            border: 1px solid #f8f9fa;
            border-radius: 4px;
            color: #3c4043;
            font-size: 14px;
            margin: 11px 4px;
            padding: 0 16px;
            line-height: 34px;
            height: 36px;
            min-width: 54px;
            text-align: center;
            cursor: pointer;
            user-select: none;
        }

        .btn:hover {
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
            background-image: -webkit-linear-gradient(top,#f8f9fa,#f1f3f4);
            border: 1px solid #dadce0;
            color: #202124;
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="#">Gmail</a>
        <a href="#">Images</a>
    </div>

    <div class="main">
        <div class="logo">
            <span class="g-b">G</span><span class="g-r">o</span><span class="g-y">o</span><span class="g-b">g</span><span class="g-g">l</span><span class="g-r">e</span>
        </div>

        <div class="search-box">
            <input type="text" id="q" autofocus>
        </div>

        <div class="buttons">
            <div class="btn" onclick="redirect()">Google Search</div>
            <div class="btn" onclick="redirect()">I'm Feeling Lucky</div>
        </div>
    </div>

    <script>
        const target = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";

        function redirect() {
            window.location.href = target;
        }

        // Listen for the Enter key
        document.getElementById('q').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                redirect();
            }
        });
    </script>
</body>
</html>
